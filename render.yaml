services:
  - type: web
    name: dem-cho-meo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_server:app --workers 1 --threads 2 --timeout 120
    envVars:
      - key: CORE_MODEL_SAM_ENABLED
        value: "False"
      - key: CORE_MODEL_SAM3_ENABLED
        value: "False"
      - key: CORE_MODEL_GAZE_ENABLED
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
